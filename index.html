<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MOAZ_HACKER_OS_V10</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; height: 100vh; overflow: hidden; position: relative; }
        
        /* 1. خلفية الأرقام (Matrix) */
        #matrix-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.2; }

        #container { display: flex; flex-direction: column; height: 100vh; z-index: 1; position: relative; }
        #screen { flex: 1; padding: 25px; overflow-y: auto; scroll-behavior: smooth; }
        
        /* 2. تظبيط شكل التعليمات والخط اللي في النص */
        .instructions { font-size: 0.9rem; color: #00ff41; margin-bottom: 10px; text-shadow: 0 0 5px #00ff41; }
        .laser-line { border-bottom: 4px solid #00ff41; margin: 15px 0 25px 0; box-shadow: 0 0 15px #00ff41, 0 0 30px #00ff41; border-radius: 10px; }

        .bar { display: flex; padding: 15px; border-top: 1px solid #00ff41; background: rgba(0, 20, 0, 0.9); }
        input { flex: 1; background: transparent; border: none; color: #00ff41; outline: none; font-size: 1.2rem; font-family: inherit; }
        
        .line { margin-bottom: 10px; }
        .ai-text { color: #00ff41; border-left: 3px solid #00ff41; padding-left: 15px; margin: 15px 0; display: block; }
        .rtl { direction: rtl; text-align: right; border-right: 3px solid #00ff41; border-left: none; padding-right: 15px; }
        .user-text { color: #fff; font-weight: bold; }
        .insta-btn { color: #ff00ff; text-decoration: none; font-weight: bold; border: 1px dashed #ff00ff; padding: 2px 5px; }
    </style>
</head>
<body>

<canvas id="matrix-bg"></canvas>

<div id="container">
    <div id="screen">
        <div class="instructions">>> MOAZ_SYSTEM_READY...</div>
        <div class="instructions">>> USE 'help' TO SEE COMMANDS.</div>
        <div class="instructions">>> USE 'contact' TO REACH THE OWNER.</div>
        
        <div class="laser-line"></div>
    </div>

    <div class="bar">
        <span style="color:#00ff41; margin-right:10px;">MOAZ@ROOT:~$</span>
        <input type="text" id="cmd" autofocus autocomplete="off">
    </div>
</div>

<script>
    // --- كود الماتريكس ---
    const canvas = document.getElementById('matrix-bg');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const letters = "010101010101010101010101010101";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0F0"; ctx.font = fontSize + "px monospace";
        for(let i = 0; i < drops.length; i++) {
            const text = letters[Math.floor(Math.random() * letters.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(draw, 33);

    // --- كود الإرسال والرد ---
    const KEY = "AIzaSyBo4OR3r8_A4CqQRNOU8DgXhCklk9YkJ8I"; 
    const box = document.getElementById('screen');
    const input = document.getElementById('cmd');

    input.addEventListener('keypress', async (e) => {
        if (e.key === 'Enter' && input.value.trim()) {
            const val = input.value.trim();
            input.value = '';
            
            const uDiv = document.createElement('div');
            uDiv.className = 'line user-text';
            uDiv.innerText = "> " + val;
            box.appendChild(uDiv);

            if (val.toLowerCase() === 'contact') {
                const cDiv = document.createElement('div');
                cDiv.className = 'line';
                cDiv.innerHTML = `>> OWNER: MOAZ SAMY <br> >> IG: <a href="https://www.instagram.com/Moaz_samy_0" target="_blank" class="insta-btn">@Moaz_samy_0</a>`;
                box.appendChild(cDiv);
                return;
            }

            const load = document.createElement('div');
            load.innerText = "[ANALYZING...]";
            box.appendChild(load);

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Short hacker reply: " + val }] }] })
                });
                const data = await res.json();
                load.remove();

                const aiDiv = document.createElement('div');
                aiDiv.className = 'ai-text';
                const response = data.candidates[0].content.parts[0].text;
                if (/[\u0600-\u06FF]/.test(response)) aiDiv.classList.add('rtl');
                
                // تأثير الكتابة حرف حرف
                let i = 0;
                const typing = setInterval(() => {
                    aiDiv.innerHTML += response.charAt(i);
                    i++;
                    box.scrollTop = box.scrollHeight;
                    if (i >= response.length) clearInterval(typing);
                }, 30);
                
                box.appendChild(aiDiv);
            } catch (err) {
                load.innerText = ">> [ERROR]: CONNECTION_LOST";
            }
            box.scrollTop = box.scrollHeight;
        }
    });
</script>
</body>
</html>
