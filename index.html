<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MOAZ SYSTEM v2 - GROQ AI</title>
<style>
body { margin: 0; background: black; color: #00ff00; font-family: monospace; overflow: hidden; }
canvas { position: fixed; top: 0; left: 0; z-index: -1; }
#container { padding: 15px; max-width: 900px; margin: auto; }
.line { margin: 6px 0; }
#divider { height: 2px; background: #00ff00; box-shadow: 0 0 10px #00ff00; margin: 15px 0; }
#terminal { height: 70vh; overflow-y: auto; padding-right: 10px; }
#terminal div { margin: 8px 0; line-height: 1.6; word-wrap: break-word; }
.prompt { display: flex; gap: 10px; margin-top: 10px; }
input { background: rgba(0,255,0,0.05); border: 1px solid #00ff00; color: #00ff00; font-family: monospace; font-size: 16px; width: 100%; padding: 8px; outline: none; box-shadow: 0 0 5px #00ff00; caret-color: #00ff00; }
.user { color: #ffffff; font-weight: bold; }
.system { color: #00aaff; }
.ai-response { color: #00ff00; border-left: 2px solid #00ff00; padding-left: 10px; white-space: pre-wrap; }
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div id="container">
<div id="header">
  <div class="line">>> MOAZ SYSTEM v2 (GROQ CORE) LOADED...</div>
  <div class="line">>> STATUS: ONLINE ✔</div>
</div>
<div id="divider"></div>
<div id="terminal"></div>
<div class="prompt">
  <span>></span>
  <input id="input" autofocus placeholder="Communicate...">
</div>
</div>

<script>
// --- MATRIX ANIMATION ---
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
canvas.height = window.innerHeight; canvas.width = window.innerWidth;
let letters = "01".split("");
let fontSize = 14;
let columns = canvas.width / fontSize;
let drops = Array(Math.floor(columns)).fill(1);
function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.15)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "rgba(0,255,0,0.15)";
  ctx.font = fontSize + "px monospace";
  for(let i=0;i<drops.length;i++){
    let text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*fontSize,drops[i]*fontSize);
    if(drops[i]*fontSize > canvas.height && Math.random()>0.975) drops[i]=0;
    drops[i]++;
  }
}
setInterval(draw,40);

// --- TERMINAL LOGIC ---
const input = document.getElementById("input");
const terminal = document.getElementById("terminal");

async function typeText(text, className = "system") {
  return new Promise(resolve => {
    let i = 0;
    let line = document.createElement("div");
    line.classList.add(className);
    terminal.appendChild(line);
    let interval = setInterval(() => {
      line.textContent += text[i];
      i++;
      terminal.scrollTop = terminal.scrollHeight;
      if (i >= text.length) { clearInterval(interval); resolve(); }
    }, 5);
  });
}

// --- GROQ API INTEGRATION ---
async function callAI(userMsg) {
  // ضع مفتاح Groq API هنا
  const API_KEY = "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"; 
  const API_URL = "https://api.groq.com/openai/v1/chat/completions";

  try {
    const response = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${API_KEY}`
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        messages: [{ role: "user", content: userMsg }]
      })
    });

    const data = await response.json();
    if (!response.ok) return "ERROR: " + (data.error?.message || "ACCESS DENIED");
    return data.choices[0].message.content;
  } catch (error) {
    return "SYSTEM ERROR: FAILED TO CONNECT TO GROQ NETWORK.";
  }
}

input.addEventListener("keydown", async function(e) {
  if (e.key === "Enter" && input.value.trim() !== "") {
    let msg = input.value;
    input.value = "";
    let userDiv = document.createElement("div");
    userDiv.className = "user";
    userDiv.textContent = "> " + msg;
    terminal.appendChild(userDiv);

    if(msg.toLowerCase() === "clear") { terminal.innerHTML = ""; return; }

    let loading = document.createElement("div");
    loading.className = "system";
    loading.textContent = ">> ANALYZING...";
    terminal.appendChild(loading);

    const aiResponse = await callAI(msg);
    terminal.removeChild(loading);
    await typeText(aiResponse, "ai-response");
  }
});
</script>
</body>
</html>
